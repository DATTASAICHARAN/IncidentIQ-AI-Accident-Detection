<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — IncidentIQ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-card__back" id="back-link">← Back to Home</a>

      <div class="auth-card__header">
        <div class="auth-card__logo">🚦</div>
        <h1 class="auth-card__title" id="auth-title">Welcome Back</h1>
        <p class="auth-card__subtitle" id="auth-subtitle">Sign in to continue</p>
      </div>

      <!-- Toggle -->
      <div class="auth-toggle">
        <button class="auth-toggle__btn active" id="toggle-login" onclick="switchMode('login')">Sign In</button>
        <button class="auth-toggle__btn" id="toggle-signup" onclick="switchMode('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleAuth(event, 'login')">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="Enter your password" required
            minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="hidden" onsubmit="handleAuth(event, 'signup')">
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input class="form-input" type="text" id="signup-name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input class="form-input" type="password" id="signup-password" placeholder="Min. 6 characters" required
            minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-confirm">Confirm Password</label>
          <input class="form-input" type="password" id="signup-confirm" placeholder="Repeat your password" required
            minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary" id="signup-btn">Create Account</button>
      </form>

      <p id="auth-error"
        style="color: var(--red-500); font-size: 0.85rem; margin-top: var(--space-md); text-align: center; display: none;">
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>

</html>
